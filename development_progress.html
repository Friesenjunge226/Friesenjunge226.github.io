<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Tracker | Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind Konfiguration für die GitHub-Farben
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        // GitHub Light
                        gh: {
                            bg: '#ffffff',
                            subtle: '#f6f8fa',
                            border: '#d0d7de',
                            text: '#1f2328',
                            blue: '#0969da'
                        },
                        // GitHub Dark
                        ghd: {
                            bg: '#0d1117',
                            subtle: '#161b22',
                            border: '#30363d',
                            text: '#c9d1d9',
                            blue: '#58a6ff'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; transition: background-color 0.2s; }
        .progress-bar { height: 8px; border-radius: 4px; overflow: hidden; }
    </style>
</head>
<body class="bg-gh-bg dark:bg-ghd-bg text-gh-text dark:text-ghd-text min-h-screen">

    <header class="bg-gh-subtle dark:bg-ghd-subtle border-b border-gh-border dark:border-ghd-border py-4 px-6 mb-8">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg height="32" viewBox="0 0 16 16" width="32" class="fill-current"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>
                <h1 class="text-xl font-semibold">Project Tracker</h1>
            </div>
            
            <button onclick="toggleTheme()" class="p-2 border border-gh-border dark:border-ghd-border rounded-md bg-gh-bg dark:bg-ghd-bg hover:bg-gh-subtle dark:hover:bg-ghd-subtle">
                <span id="theme-icon-sun" class="hidden">☀️</span>
                <span id="theme-icon-moon">🌙</span>
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 pb-12">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="border border-gh-border dark:border-ghd-border rounded-md p-4 bg-gh-bg dark:bg-ghd-subtle shadow-sm">
                <p class="text-xs text-gray-500 uppercase font-bold">Active</p>
                <p class="text-2xl font-bold" id="total-projects">0</p>
            </div>
            <div class="border border-gh-border dark:border-ghd-border rounded-md p-4 bg-gh-bg dark:bg-ghd-subtle shadow-sm">
                <p class="text-xs text-gray-500 uppercase font-bold">Done</p>
                <p class="text-2xl font-bold text-green-600 dark:text-green-500" id="completed-projects">0</p>
            </div>
            <div class="border border-gh-border dark:border-ghd-border rounded-md p-4 bg-gh-bg dark:bg-ghd-subtle shadow-sm">
                <p class="text-xs text-gray-500 uppercase font-bold">Avg. Progress</p>
                <p class="text-2xl font-bold text-gh-blue dark:text-ghd-blue" id="avg-progress">0%</p>
            </div>
        </div>

        <div id="project-list" class="space-y-4">
            </div>

    </main>

    <script>
        // 1. Daten-Management
        const projects = [
{ name: "Kube of the wild", desc: "A Mod to recreate the Zelda(TM) feel in Minecraft", progress: 20, status: "Paused" },
            { name: "Moderation-Tracker", desc: "A Tracker for Moderators on Twitch", progress: 85, status: "In Progress" },
            { name: "SaS App", desc: "Mobile App for SaS", progress: 10, status: "Active" },
            { name: "hungergames", desc: "A game", progress: 5, status: "Planning" }
        ];

        // 2. Theme Logic
        function initTheme() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                updateIcons(true);
            } else {
                document.documentElement.classList.remove('dark');
                updateIcons(false);
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            updateIcons(isDark);
        }

        function updateIcons(isDark) {
            document.getElementById('theme-icon-sun').classList.toggle('hidden', !isDark);
            document.getElementById('theme-icon-moon').classList.toggle('hidden', isDark);
        }

        // 3. Render Logic
        function renderProjects() {
            const listContainer = document.getElementById('project-list');
            let totalProgress = 0;
            let completed = 0;

            listContainer.innerHTML = projects.map(p => {
                totalProgress += p.progress;
                if(p.progress === 100) completed++;

                return `
                <div class="border border-gh-border dark:border-ghd-border rounded-md p-4 bg-gh-bg dark:bg-ghd-subtle hover:border-gh-blue dark:hover:border-ghd-blue transition-colors group">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="text-lg font-semibold text-gh-blue dark:text-ghd-blue group-hover:underline cursor-pointer">${p.name}</h3>
                            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">${p.desc}</p>
                        </div>
                        <span class="text-xs font-medium px-2 py-0.5 rounded-full border border-gh-border dark:border-ghd-border bg-gh-subtle dark:bg-ghd-bg">
                            ${p.status}
                        </span>
                    </div>
                    
                    <div class="mt-4">
                        <div class="flex justify-between text-xs mb-1 text-gray-500">
                            <span>Fortschritt</span>
                            <span class="font-mono">${p.progress}%</span>
                        </div>
                        <div class="progress-bar bg-gray-200 dark:bg-gray-700">
                            <div class="h-full bg-green-500 dark:bg-green-600 transition-all duration-500" style="width: ${p.progress}%"></div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            document.getElementById('total-projects').innerText = projects.length;
            document.getElementById('completed-projects').innerText = completed;
            document.getElementById('avg-progress').innerText = Math.round(totalProgress / projects.length) + "%";
        }

        // Start
        initTheme();
        renderProjects();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
        .gh-border { border-color: #d0d7de; }
        .gh-bg-gray { background-color: #f6f8fa; }
        .gh-blue { color: #0969da; }
        .progress-bar { height: 8px; border-radius: 4px; background-color: #eee; overflow: hidden; }
        .progress-fill { height: 100%; background-color: #2da44e; border-radius: 4px; }
    </style>
</head>
<body class="bg-white text-[#1f2328]">

    <header class="gh-bg-gray border-b gh-border py-4 px-6 mb-8">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg height="32" viewBox="0 0 16 16" width="32" class="fill-current"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>
                <h1 class="text-xl font-semibold">Project Dashboard</h1>
            </div>
            <span class="text-sm border gh-border rounded-full px-3 py-1 gh-bg-gray">Public</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="border gh-border rounded-md p-4 bg-white shadow-sm">
                <p class="text-sm text-gray-500">Active Projects</p>
                <p class="text-2xl font-bold" id="total-projects">0</p>
            </div>
            <div class="border gh-border rounded-md p-4 bg-white shadow-sm">
                <p class="text-sm text-gray-500">Completed</p>
                <p class="text-2xl font-bold text-green-600" id="completed-projects">0</p>
            </div>
            <div class="border gh-border rounded-md p-4 bg-white shadow-sm">
                <p class="text-sm text-gray-500">Avg. Progress</p>
                <p class="text-2xl font-bold text-blue-600" id="avg-progress">0%</p>
            </div>
        </div>

        <div id="project-list" class="space-y-4">
            </div>

    </main>

    <script>
        // Deine Projektdaten - hier kannst du einfach neue hinzufügen!
        const projects = [
            { name: "Kube of the wild", desc: "A Mod to recreate The Zelda(TM) feel in Minecraft", progress: 20, status: "Active" },
            { name: "Moderation-Tracker", desc: "A Tracker for Moderators on twitch", progress: 85, status: "In Progress" },
            { name: "JustMusic Website", desc: "A Website for JustMusic", progress: 100, status: "Done" },
            { name: "SaS App", desc: "Mobile App for SaS", progress: 10, status: "Active" },
            { name: "hungergames", desc: "A game", progress: 10, status: "Planning" }
        ];

        const listContainer = document.getElementById('project-list');
        
        function renderProjects() {
            let totalProgress = 0;
            let completed = 0;

            listContainer.innerHTML = projects.map(p => {
                totalProgress += p.progress;
                if(p.progress === 100) completed++;

                return `
                <div class="border gh-border rounded-md p-4 hover:bg-gray-50 transition-colors bg-white">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="text-lg font-semibold gh-blue hover:underline cursor-pointer">${p.name}</h3>
                            <p class="text-sm text-gray-600 mt-1">${p.desc}</p>
                        </div>
                        <span class="text-xs font-medium px-2 py-0.5 rounded-full border gh-border ${p.progress === 100 ? 'bg-green-100 text-green-700' : 'gh-bg-gray text-gray-600'}">
                            ${p.status}
                        </span>
                    </div>
                    
                    <div class="mt-4">
                        <div class="flex justify-between text-xs mb-1 text-gray-500">
                            <span>Progress</span>
                            <span>${p.progress}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${p.progress}%"></div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            // Stats updaten
            document.getElementById('total-projects').innerText = projects.length;
            document.getElementById('completed-projects').innerText = completed;
            document.getElementById('avg-progress').innerText = Math.round(totalProgress / projects.length) + "%";
        }

        renderProjects();
    </script>
</body>
</html>
